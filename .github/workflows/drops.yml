name: Twitch Drops Watcher

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run watcher (force env)
        shell: pwsh
        run: |
          $env:DISCORD_WEBHOOK_URL = '${{ secrets.DISCORD_WEBHOOK_URL }}'
          if ([string]::IsNullOrWhiteSpace($env:DISCORD_WEBHOOK_URL)) {
            throw "DISCORD_WEBHOOK_URL still missing"
          }
          dotnet run --configuration Release
