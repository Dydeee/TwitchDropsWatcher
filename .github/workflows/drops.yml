name: Twitch Drops Watcher

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run watcher
        run: dotnet run --configuration Release -- "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Commit sent.txt if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sent.txt
          git diff --cached --quiet || git commit -m "Update sent.txt"
          git push
